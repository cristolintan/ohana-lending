<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ohana Lending Corporant</title>

  <!-- PWA / iOS meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ohana" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#047857" />

  <!-- Tailwind (CDN — no build needed) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + Babel (no build step needed) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- PDF export (html2canvas + jsPDF) -->
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    /* Safe area insets for iPhone notch / home bar */
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      background: #f8fafc;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;   /* no pull-to-refresh bounce in the PWA */
    }
    /* Smooth momentum scroll on iOS */
    .scroll-ios { -webkit-overflow-scrolling: touch; overflow-y: auto; }
    /* Prevent text size adjustment on rotation */
    html { -webkit-text-size-adjust: 100%; }
    /* Remove 300ms tap delay & double-tap zoom on controls */
    button, a, select, [role="button"] { touch-action: manipulation; }
    /* Stop iOS from auto-zooming when an input is focused (font must be >= 16px) */
    @media (max-width: 640px) {
      input, select, textarea { font-size: 16px !important; }
    }
    /* ── Smooth animations ── */
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp  { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 16px); } to { opacity: 1; transform: translate(-50%, 0); } }
    .animate-fade-in  { animation: fadeIn  0.25s ease-out both; }
    .animate-fade-up  { animation: fadeUp  0.30s ease-out both; }
    .animate-scale-in { animation: scaleIn 0.20s ease-out both; }
    .animate-slide-up { animation: slideUp 0.30s cubic-bezier(0.16, 1, 0.3, 1) both; }
    /* Respect users who prefer reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }
    /* Print: show only the loan agreement document */
    @media print {
      body * { visibility: hidden !important; }
      #agreement-print, #agreement-print * { visibility: visible !important; }
      #agreement-print {
        position: absolute; left: 0; top: 0; width: 100%;
        border: none !important; box-shadow: none !important; border-radius: 0 !important;
        -webkit-print-color-adjust: exact; print-color-adjust: exact;
      }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app.js"></script>
  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
