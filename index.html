<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ohana Lending Corporant</title>

  <!-- PWA / iOS meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ohana" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#047857" />

  <!-- Tailwind (CDN — no build needed) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + Babel (no build step needed) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- PDF export (html2canvas + jsPDF) -->
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    /* Safe area insets for iPhone notch / home bar */
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      background: #f8fafc;
      -webkit-tap-highlight-color: transparent;
    }
    /* Smooth momentum scroll on iOS */
    .scroll-ios { -webkit-overflow-scrolling: touch; overflow-y: auto; }
    /* Prevent text size adjustment on rotation */
    html { -webkit-text-size-adjust: 100%; }
    /* Print: show only the loan agreement document */
    @media print {
      body * { visibility: hidden !important; }
      #agreement-print, #agreement-print * { visibility: visible !important; }
      #agreement-print {
        position: absolute; left: 0; top: 0; width: 100%;
        border: none !important; box-shadow: none !important; border-radius: 0 !important;
        -webkit-print-color-adjust: exact; print-color-adjust: exact;
      }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app.js"></script>
  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
